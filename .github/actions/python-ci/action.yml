name: "Python CI Composite"
description: "Lint, test and coverage for Python projects with pytest and ruff."
inputs:
  python-version:
    description: "Python version to use (e.g., 3.11, 3.12)"
    required: true
    type: string
  working-directory:
    description: "Directory containing the Python project"
    required: false
    default: "."
  requirements-file:
    description: "Path to requirements.txt"
    required: false
    default: "requirements.txt"
  test-command:
    description: "Command to run tests"
    required: false
    default: "pytest -v --cov --cov-report=xml"
  lint-command:
    description: "Command to run linter (empty string to skip)"
    required: false
    default: "ruff check ."
  coverage-file:
    description: "Path to coverage XML file for upload"
    required: false
    default: "coverage.xml"
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"
        cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.requirements-file }}

    - name: Install dependencies
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ inputs.requirements-file }}
      shell: bash

    - name: Run linter
      if: ${{ inputs.lint-command != '' }}
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.lint-command }}
      shell: bash

    - name: Run tests with coverage
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.test-command }}
      shell: bash

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ${{ inputs.working-directory }}/${{ inputs.coverage-file }}
        flags: python
        fail_ci_if_error: false
        token: ${{ inputs.codecov-token || '' }}
